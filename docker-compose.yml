services:
  # ---------------------------------------------------------------------
  # POSTGRESQL
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: festival-postgres
    environment:
      POSTGRES_USER: festival
      POSTGRES_PASSWORD: festival
      POSTGRES_DB: festivalos
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festival -d festivalos"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - festival-net

  processor:
    build: ./processor
    container_name: festival-processor
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      POSTGRES_DSN: postgresql://festival:festival@postgres:5432/festivalos
      AGG_WINDOW_SECONDS: 15
    restart: unless-stopped
    networks:
      - festival-net

  api:
    build: ./api
    container_name: festival-api
    ports:
      - "8001:8000"
    depends_on:
      - postgres
    environment:
      POSTGRES_DSN: postgresql://festival:festival@postgres:5432/festivalos
      WS_PUSH_INTERVAL_SECONDS: "2.0"
    restart: unless-stopped
    networks:
      - festival-net

  frontend:
    build: ./frontend
    container_name: festival-frontend
    depends_on:
      - api
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    networks:
      - festival-net

  # ---------------------------------------------------------------------
  # KAFKA (mode KRaft, un seul broker, pas de Zookeeper)
  # ---------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.7.0
    container_name: festival-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - festival-net

  # Crée les topics au démarrage puis s'arrête (service "one-shot")
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: festival-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic visitors.position --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic logistics.stock --partitions 1 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic alerts.critical --partitions 1 --replication-factor 1 &&
      echo 'Topics créés.'
      "
    networks:
      - festival-net

  # ---------------------------------------------------------------------
  # SIMULATOR — génère visiteurs / scènes / stocks et publie sur Kafka
  # ---------------------------------------------------------------------
  simulator:
    build: ./simulator
    container_name: festival-simulator
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      NUM_VISITORS: 300
      TICK_SECONDS: 2
    restart: unless-stopped
    networks:
      - festival-net

volumes:
  kafka_data:
  pg_data:

networks:
  festival-net:
    driver: bridge