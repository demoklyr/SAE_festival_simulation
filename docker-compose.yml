services:
  # ---------------------------------------------------------------------
  # POSTGRESQL
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: festival-postgres
    environment:
      POSTGRES_USER: festival
      POSTGRES_PASSWORD: festival
      POSTGRES_DB: festivalos
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festival -d festivalos"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - festival-net

volumes:
  pg_data:

networks:
  festival-net:
    driver: bridge